server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # never cache the service worker or manifest, so updates ship immediately
    location = /sw.js               { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest{ add_header Cache-Control "no-cache"; default_type application/manifest+json; }

    # fingerprint-free static assets: short cache
    location / { try_files $uri $uri/ /index.html; }

    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js;
        application/manifest+json             webmanifest;
        font/woff2                            woff2;
        font/woff                             woff;
        image/png                             png;
        image/svg+xml                         svg;
    }
}
